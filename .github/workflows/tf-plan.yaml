name: Terraform Plan (exclude dev)

on:
  pull_request:
    branches-ignore: [dev]
  push:
    branches-ignore: [dev]

permissions:
  contents: read
  pull-requests: write

env:
  TF_WORKDIR: "infra"

jobs:
  plan:
    runs-on: ubuntu-latest
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.5

      - name: Configure AWS Credentials (Access Keys)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-3

      - name: Terraform fmt (check)
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform init -input=false

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKDIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKDIR }}
        run: |
          set -e
          terraform plan -no-color -input=false -out=tfplan.bin
          terraform show -no-color tfplan.bin > plan_output.txt

      - name: Comment plan to PR
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const outPath = path.join(process.env.TF_WORKDIR || './infra', 'plan_output.txt');
            let body = '';
            try { body = fs.readFileSync(outPath, 'utf8'); }
            catch { body = '❌ plan_output.txt 를 찾을 수 없습니다. `Terraform Plan` 단계가 실패했을 수 있어요.'; }
            const MAX = 60000;
            const truncated = body.length > MAX ? body.slice(0, MAX) + '\n\n...(truncated)...' : body;

            const status = '${{ job.status }}';
            const header = status === 'success'
              ? '✅ **Terraform Plan 성공**'
              : status === 'failure'
                ? '❌ **Terraform Plan 실패**'
                : `⚠️ **Terraform Plan 상태: ${status}**`;

            const comment = [
              '<!-- tf-plan-comment -->',
              header,
              '',
              '**Workspace:** `' + (process.env.TF_WORKDIR || './infra') + '`',
              '',
              '<details><summary>Plan 출력 보기</summary>',
              '',
              '```',
              truncated,
              '```',
              '',
              '</details>'
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.user.type === 'Bot' && c.body && c.body.includes('<!-- tf-plan-comment -->'));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: comment
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: comment
              });
            }

      - name: Fail if plan step failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
