name: Code Deploys

on:
  workflow_run:
    workflows: ["Terraform Apply"]
    types: [completed]

jobs:
  build:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'dev' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    env:
      AWS_REGION: ap-northeast-3
      ECR_REPOSITORY: lugeasy/server
      IMAGE_TAG: ${{ github.event.workflow_run.head_branch }}-${{ github.event.workflow_run.head_sha }}

    steps:
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"
          server-id: github
          settings-path: ${{ github.workspace }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Checkout repo (same commit as tf-apply)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          token: ${{ secrets.LUGEASY_ACTIONS_TOKEN }}
          submodules: true

      - name: Git Submodule Update
        run: git submodule update --remote --recursive

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build with Gradle
        working-directory: ./lugeasy
        run: |
          chmod +x gradlew
          ./gradlew clean build -x test

      # (선택) buildx 캐시로 빠르게
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build, tag, and push image to Amazon ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          # Dockerfile은 ./lugeasy 기준
          docker build \
            -t $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
            ./lugeasy
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

      - name: Prepare SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > ec2_key.pem
          chmod 600 ec2_key.pem

      - name: Deploy to EC2 and run container
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          ssh -o StrictHostKeyChecking=no -i ec2_key.pem ${{ secrets.EC2_USER }}@16.209.13.92 << EOF
          set -euo pipefail

          # --- 변수 주입 (원격에서 사용) ---
          export AWS_REGION="${{ env.AWS_REGION }}"
          export ECR_REGISTRY="${{ env.ECR_REGISTRY }}"
          export ECR_REPOSITORY="${{ env.ECR_REPOSITORY }}"
          export IMAGE_TAG="${{ env.IMAGE_TAG }}"

          echo "==> ECR 로그인"
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"

          echo "==> 기존 컨테이너 중지 및 삭제"
          docker ps -aq --filter "name=lugeasy-server" | xargs -r docker rm -f

          echo "==> 최신 이미지 Pull 및 실행"
          docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker run -d --name lugeasy-server --restart unless-stopped \
            -p 8080:8080 \
            "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

          echo "==> 현재 실행 중인 컨테이너"
          docker ps
          EOF
