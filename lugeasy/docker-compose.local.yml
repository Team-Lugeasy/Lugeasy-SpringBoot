version: '3.8'

services:
  mariadb:
    container_name: mariadb-lugeasy-local
    image: mariadb:latest
    ports:
      - ${MARIADB_OUTER_PORT}:${MARIADB_INNER_PORT}
    environment:
      - MARIADB_DATABASE=${MARIADB_DATABASE}
      - MARIADB_USER=${MARIADB_USER}
      - MARIADB_PASSWORD=${MARIADB_PASSWORD}
      - MARIADB_ROOT_PASSWORD=${MARIADB_ROOT_PASSWORD}
    networks:
      lugeasy_network:
        ipv4_address: ${NETWORK_MARIADB_IP}
  redis:
    container_name: redis-lugeasy-local
    image: redis:latest
    ports:
      - ${REDIS_OUTER_PORT}:${REDIS_INNER_PORT}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    networks:
      lugeasy_network:
        ipv4_address: ${NETWORK_REDIS_IP}
